<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecommerce Pipeline Demo</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #fff; color: #111827; }
    input[type=range] { width: 100%; height: 4px; cursor: pointer; }
    button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    /* ── palette ──────────────────────────────────────────────────── */
    const C = {
      navy:   '#1B4F72',
      blue:   '#2E86AB',
      orange: '#F18F01',
      plum:   '#A23B72',
      red:    '#C73E1D',
      green:  '#059669',
      text:   '#111827',
      sub:    '#6B7280',
      light:  '#F9FAFB',
      border: '#E5E7EB',
    };

    /* ── synthetic data ───────────────────────────────────────────── */
    const BASE_ORDERS          = 325;
    const BASE_REVENUE_PER_ORD = 274;
    const BASE_FORECAST_UNITS  = 1360;
    const AVG_ELASTICITY       = 1.17; // abs value, weighted avg across mix

    const PRODUCT_MIX = [
      { name: 'T-Shirt',  share: 0.38, eps: -1.35 },
      { name: 'Hoodie',   share: 0.24, eps: -1.21 },
      { name: 'Hat',      share: 0.18, eps: -1.77 },
      { name: 'Jacket',   share: 0.12, eps: -0.76 },
      { name: 'Tote Bag', share: 0.08, eps: -0.40 },
    ];

    // [lat, lon, dcIndex (0=NJ 1=IL 2=TX 3=CA), zoneSkip]
    const CUSTOMERS = [
      // Northeast → NJ-DC
      [40.71,-74.01,0,0],[42.36,-71.06,0,0],[39.95,-75.17,0,0],[41.31,-72.93,0,0],
      [43.05,-76.15,0,0],[38.90,-77.04,0,0],[44.31,-69.79,0,0],[41.82,-71.42,0,0],
      [40.19,-74.76,0,0],[42.73,-73.69,0,0],[39.50,-76.43,0,0],[41.05,-73.54,0,0],
      [44.10,-70.22,0,0],[43.65,-72.32,0,0],[42.10,-70.94,0,0],[41.50,-74.00,0,0],
      [39.29,-76.61,0,0],[43.22,-71.55,0,0],[40.60,-75.49,0,0],[38.35,-81.63,0,0],
      // Midwest → IL-DC
      [41.88,-87.63,1,0],[43.07,-89.40,1,0],[44.98,-93.27,1,0],[41.50,-81.69,1,0],
      [39.96,-82.99,1,0],[38.25,-85.76,1,0],[46.88,-96.79,1,0],[44.05,-92.46,1,0],
      [45.52,-94.15,1,0],[42.73,-84.55,1,0],[40.41,-86.88,1,0],[43.62,-84.46,1,0],
      [39.10,-94.58,1,0],[38.05,-84.50,1,0],[41.26,-95.93,1,0],[43.05,-76.15,1,0],
      [44.52,-88.02,1,0],[42.50,-92.32,1,0],[46.79,-92.11,1,0],[37.69,-97.34,1,0],
      // South → TX-DC
      [32.78,-96.80,2,0],[29.76,-95.37,2,0],[30.27,-97.74,2,0],[33.75,-84.39,2,0],
      [35.23,-80.84,2,0],[36.16,-86.78,2,0],[25.77,-80.19,2,0],[32.30,-90.18,2,0],
      [35.47,-97.52,2,0],[31.10,-97.37,2,0],[34.73,-86.67,2,0],[30.69,-88.04,2,0],
      [35.15,-90.05,2,0],[27.95,-82.46,2,0],[29.42,-98.49,2,0],[32.08,-81.10,2,0],
      [35.99,-78.90,2,0],[34.00,-81.03,2,0],[29.95,-90.07,2,0],[36.17,-115.14,2,0],
      // West → CA-DC
      [34.05,-118.24,3,0],[37.77,-122.42,3,0],[33.45,-112.07,3,0],[36.17,-115.14,3,0],
      [32.72,-117.15,3,0],[37.34,-121.89,3,0],[38.58,-121.49,3,0],[35.37,-119.02,3,0],
      [34.41,-117.63,3,0],[33.75,-116.21,3,0],[36.75,-119.77,3,0],[38.29,-122.05,3,0],
      [33.99,-118.47,3,0],[37.55,-122.05,3,0],[34.18,-118.60,3,0],[34.63,-120.46,3,0],
      // Pacific Northwest → zone-skip
      [47.61,-122.33,3,1],[45.52,-122.68,3,1],[48.51,-119.51,3,1],[46.87,-123.01,3,1],
      [47.04,-120.55,3,1],[48.42,-110.32,3,1],[46.86,-96.76,3,1],
      // Mountain West → zone-skip
      [39.74,-104.98,3,1],[40.76,-111.89,3,1],[43.62,-116.20,3,1],[46.87,-110.36,3,1],
      [41.14,-104.82,1,1],[43.09,-108.80,3,1],[35.10,-106.65,3,1],[37.27,-107.88,3,1],
      // Alaska
      [61.22,-149.90,3,1],[64.84,-147.72,3,1],
      // Hawaii
      [21.31,-157.80,3,1],[20.80,-156.33,3,1],
    ];

    const DCS = [
      { name: 'NJ-DC', lat: 40.74, lon: -74.17, color: C.navy  },
      { name: 'IL-DC', lat: 41.88, lon: -87.63, color: C.blue  },
      { name: 'TX-DC', lat: 32.78, lon: -96.80, color: C.orange},
      { name: 'CA-DC', lat: 34.05, lon: -118.24,color: C.plum  },
    ];

    /* ── derived calculations ─────────────────────────────────────── */
    function calcStats(discPct, mult) {
      const d = discPct / 100;
      const nOrders      = Math.round(BASE_ORDERS * mult);
      const revenue      = Math.round(nOrders * BASE_REVENUE_PER_ORD * (1 - d * 0.55));
      const actualUnits  = Math.round(BASE_FORECAST_UNITS * mult * (1 + d * AVG_ELASTICITY));
      const forecastUnits= BASE_FORECAST_UNITS;
      const deltaPct     = ((actualUnits - forecastUnits) / forecastUnits) * 100;
      const nGround      = CUSTOMERS.filter(c => !c[3]).length;
      const nZoneSkip    = CUSTOMERS.length - nGround;
      const shipCost     = Math.round(nOrders * 12.8);
      return { nOrders, revenue, actualUnits, forecastUnits, deltaPct, nGround, nZoneSkip, shipCost };
    }

    /* ── animated counter ─────────────────────────────────────────── */
    function useCounter(target, active, duration = 1100) {
      const [val, setVal] = useState(0);
      const raf = useRef(null);
      useEffect(() => {
        if (!active) { setVal(0); return; }
        const start = performance.now();
        const tick = (now) => {
          const p = Math.min(1, (now - start) / duration);
          const e = 1 - Math.pow(1 - p, 3);
          setVal(Math.round(e * target));
          if (p < 1) raf.current = requestAnimationFrame(tick);
        };
        raf.current = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf.current);
      }, [target, active]);
      return val;
    }

    /* ── card shell ───────────────────────────────────────────────── */
    function Card({ number, title, accentColor, visible, children }) {
      return (
        <div style={{
          opacity: visible ? 1 : 0,
          transform: visible ? 'translateY(0)' : 'translateY(20px)',
          transition: 'opacity 0.45s ease, transform 0.45s ease',
          border: `1px solid ${C.border}`,
          borderRadius: 12,
          overflow: 'hidden',
          background: '#fff',
        }}>
          <div style={{
            background: accentColor,
            padding: '10px 20px',
            display: 'flex',
            alignItems: 'center',
            gap: 10,
          }}>
            <span style={{
              background: 'rgba(255,255,255,0.22)',
              borderRadius: '50%',
              width: 24, height: 24,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 12, fontWeight: 700, color: '#fff', flexShrink: 0,
            }}>{number}</span>
            <span style={{ fontSize: 14, fontWeight: 600, color: '#fff' }}>{title}</span>
          </div>
          <div style={{ padding: 24 }}>{children}</div>
        </div>
      );
    }

    function Connector({ visible }) {
      return (
        <div style={{
          display: 'flex', justifyContent: 'center', padding: '2px 0',
          opacity: visible ? 1 : 0, transition: 'opacity 0.35s ease 0.15s',
        }}>
          <svg width="20" height="28" viewBox="0 0 20 28">
            <line x1="10" y1="0" x2="10" y2="18" stroke={C.border} strokeWidth="2"/>
            <polygon points="4,17 10,28 16,17" fill={C.border}/>
          </svg>
        </div>
      );
    }

    /* ── stage 1: orders ──────────────────────────────────────────── */
    function OrdersCard({ visible, nOrders, revenue }) {
      const animOrders  = useCounter(nOrders,  visible);
      const animRevenue = useCounter(revenue,  visible);
      const barColors   = [C.navy, C.blue, C.orange, C.plum, C.sub];

      return (
        <Card number={1} title="Orders Generated" accentColor={C.navy} visible={visible}>
          <div style={{ display: 'flex', gap: 40, marginBottom: 24 }}>
            <div>
              <div style={{ fontSize: 52, fontWeight: 900, color: C.navy, lineHeight: 1 }}>
                {animOrders.toLocaleString()}
              </div>
              <div style={{ fontSize: 13, color: C.sub, marginTop: 5 }}>orders · Jan 2012</div>
            </div>
            <div>
              <div style={{ fontSize: 52, fontWeight: 900, color: C.orange, lineHeight: 1 }}>
                ${Math.round(animRevenue / 1000)}K
              </div>
              <div style={{ fontSize: 13, color: C.sub, marginTop: 5 }}>revenue</div>
            </div>
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 9 }}>
            {PRODUCT_MIX.map((p, i) => (
              <div key={p.name} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{ width: 66, fontSize: 13, color: '#374151', flexShrink: 0 }}>{p.name}</div>
                <div style={{ flex: 1, background: '#F3F4F6', borderRadius: 3, height: 7, overflow: 'hidden' }}>
                  <div style={{
                    width: visible ? `${p.share * 100}%` : '0%',
                    height: '100%',
                    background: barColors[i],
                    transition: `width 0.75s ease ${0.05 + i * 0.1}s`,
                    borderRadius: 3,
                  }}/>
                </div>
                <div style={{ width: 30, fontSize: 12, color: C.sub, textAlign: 'right', flexShrink: 0 }}>
                  {Math.round(p.share * 100)}%
                </div>
              </div>
            ))}
          </div>
        </Card>
      );
    }

    /* ── stage 2: forecast ────────────────────────────────────────── */
    function ForecastCard({ visible, actualUnits, forecastUnits, deltaPct }) {
      const above     = deltaPct >= 0;
      const deltaColor = above ? C.green : C.red;
      const arrow      = above ? '↑' : '↓';
      const label      = above ? 'above band' : 'below band';

      return (
        <Card number={2} title="Demand vs. Forecast" accentColor={C.blue} visible={visible}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
              <span style={{ fontSize: 14, color: C.sub }}>Forecast (Jan 2012)</span>
              <span style={{ fontSize: 24, fontWeight: 700, color: '#374151' }}>
                {forecastUnits.toLocaleString()} units
              </span>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
              <span style={{ fontSize: 14, color: C.sub }}>Actual (generated)</span>
              <span style={{ fontSize: 24, fontWeight: 700, color: C.navy }}>
                {actualUnits.toLocaleString()} units
              </span>
            </div>
            <div style={{
              borderTop: `1px solid ${C.border}`,
              paddingTop: 14,
              display: 'flex',
              justifyContent: 'flex-end',
              alignItems: 'center',
              gap: 6,
            }}>
              <span style={{ fontSize: 13, color: C.sub }}>└─</span>
              <span style={{ fontSize: 22, fontWeight: 800, color: deltaColor }}>
                {above ? '+' : ''}{deltaPct.toFixed(1)}% {label} {arrow}
              </span>
            </div>
          </div>
        </Card>
      );
    }

    /* ── stage 3: pricing signal ──────────────────────────────────── */
    function PricingCard({ visible, discPct }) {
      const d = discPct / 100;
      const rows = PRODUCT_MIX.map(p => {
        const elastic = Math.abs(p.eps) > 1;
        let signal, color, icon;
        if (d > 0 && elastic)  { signal = 'Discount working';    color = C.green;  icon = '✓'; }
        else if (d > 0)        { signal = 'Leaking margin';      color = C.red;    icon = '!'; }
        else if (elastic)      { signal = 'Discount opportunity'; color = C.orange; icon = '↓'; }
        else                   { signal = 'Hold price';           color = C.sub;    icon = '→'; }
        return { ...p, signal, color, icon };
      });

      return (
        <Card number={3} title="Pricing Signal" accentColor={C.plum} visible={visible}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
            <div style={{
              display: 'grid',
              gridTemplateColumns: '96px 52px 1fr',
              gap: 8,
              padding: '0 8px 8px',
              fontSize: 11, fontWeight: 600,
              color: '#9CA3AF',
              letterSpacing: '0.06em',
              textTransform: 'uppercase',
              borderBottom: `1px solid ${C.border}`,
              marginBottom: 4,
            }}>
              <span>Category</span>
              <span style={{ textAlign: 'right' }}>ε</span>
              <span>Signal</span>
            </div>
            {rows.map((r, i) => (
              <div key={r.name} style={{
                display: 'grid',
                gridTemplateColumns: '96px 52px 1fr',
                gap: 8,
                padding: '9px 8px',
                borderRadius: 6,
                background: i % 2 === 0 ? C.light : 'transparent',
                opacity: visible ? 1 : 0,
                transition: `opacity 0.35s ease ${i * 0.07}s`,
              }}>
                <span style={{ fontSize: 14, fontWeight: 500 }}>{r.name}</span>
                <span style={{ fontSize: 14, fontWeight: 600, color: '#374151', textAlign: 'right' }}>
                  {r.eps.toFixed(2)}
                </span>
                <span style={{ fontSize: 13, color: r.color, fontWeight: 600 }}>
                  {r.icon} {r.signal}
                </span>
              </div>
            ))}
          </div>
        </Card>
      );
    }

    /* ── stage 4: routing map ─────────────────────────────────────── */
    const SVG_W = 580, SVG_H = 310;
    const LAT_MIN = 24.5, LAT_MAX = 49.5, LON_MIN = -124.5, LON_MAX = -66.5;

    function toXY(lat, lon) {
      const x = (lon - LON_MIN) / (LON_MAX - LON_MIN) * SVG_W;
      const y = (1 - (lat - LAT_MIN) / (LAT_MAX - LAT_MIN)) * SVG_H;
      return [x, y];
    }

    function RoutingCard({ visible, nOrders, shipCost, nGround, nZoneSkip }) {
      const total      = nGround + nZoneSkip;
      const pctGround  = Math.round(nGround  / total * 100);
      const pctZoneSkip= 100 - pctGround;
      const dcColors   = [C.navy, C.blue, C.orange, C.plum];

      // Continental customers only (lat 25–50, lon -125–-65)
      const continental = CUSTOMERS.filter(c =>
        c[0] >= 24.5 && c[0] <= 49.5 && c[1] >= -124.5 && c[1] <= -66.5
      );
      // AK + HI shown as small inset dots
      const outOfBounds = CUSTOMERS.filter(c =>
        c[0] > 49.5 || c[0] < 24.5 || c[1] < -124.5
      );

      return (
        <Card number={4} title="Order Routing" accentColor={C.orange} visible={visible}>
          {/* Map */}
          <div style={{ borderRadius: 8, overflow: 'hidden', marginBottom: 20 }}>
            <svg viewBox={`0 0 ${SVG_W} ${SVG_H}`} style={{ width: '100%', display: 'block' }}>
              {/* Background */}
              <rect width={SVG_W} height={SVG_H} fill="#EBF2F7"/>

              {/* Subtle US bounding box hint */}
              <rect x={12} y={8} width={SVG_W-24} height={SVG_H-16}
                fill="none" stroke="#D1D9E0" strokeWidth="1" rx="4"/>

              {/* Customer dots */}
              {continental.map((c, i) => {
                const [x, y] = toXY(c[0], c[1]);
                const col    = c[3] ? C.orange : dcColors[c[2]];
                return (
                  <circle key={i} cx={x} cy={y} r={4.5}
                    fill={col} fillOpacity={visible ? 0.72 : 0}
                    style={{ transition: `fill-opacity 0.25s ease ${i * 0.012}s` }}
                  />
                );
              })}

              {/* DC markers */}
              {DCS.map((dc, i) => {
                const [x, y] = toXY(dc.lat, dc.lon);
                return (
                  <g key={dc.name}>
                    <circle cx={x} cy={y} r={10} fill={dc.color}
                      stroke="#fff" strokeWidth={2}
                      fillOpacity={visible ? 1 : 0}
                      style={{ transition: 'fill-opacity 0.3s ease 0.6s' }}/>
                    <text x={x} y={y+1} textAnchor="middle" dominantBaseline="middle"
                      fontSize={10} fill="#fff" fontWeight="bold"
                      opacity={visible ? 1 : 0}
                      style={{ transition: 'opacity 0.3s ease 0.6s', userSelect: 'none' }}>★</text>
                    <text x={x} y={y+18} textAnchor="middle" fontSize={9} fill={dc.color}
                      fontWeight="600" opacity={visible ? 1 : 0}
                      style={{ transition: 'opacity 0.3s ease 0.7s', userSelect: 'none' }}>
                      {dc.name}
                    </text>
                  </g>
                );
              })}

              {/* AK/HI inset */}
              <rect x={10} y={SVG_H-48} width={120} height={42}
                fill="rgba(255,255,255,0.55)" stroke="#D1D9E0" strokeWidth="1" rx="3"/>
              <text x={16} y={SVG_H-36} fontSize={9} fill={C.sub} fontWeight="600">AK / HI</text>
              {outOfBounds.map((c, i) => (
                <circle key={'ob'+i} cx={16 + i * 9} cy={SVG_H-22} r={3.5}
                  fill={c[3] ? C.orange : dcColors[c[2]]}
                  fillOpacity={visible ? 0.72 : 0}
                  style={{ transition: `fill-opacity 0.25s ease ${0.8 + i * 0.05}s` }}/>
              ))}
            </svg>
          </div>

          {/* Stats row */}
          <div style={{ display: 'flex', gap: 32, marginBottom: 16 }}>
            <div>
              <div style={{ fontSize: 40, fontWeight: 900, color: C.navy, lineHeight: 1 }}>
                {pctGround}%
              </div>
              <div style={{ fontSize: 12, color: C.sub, marginTop: 4 }}>ground shipping</div>
            </div>
            <div>
              <div style={{ fontSize: 40, fontWeight: 900, color: C.orange, lineHeight: 1 }}>
                {pctZoneSkip}%
              </div>
              <div style={{ fontSize: 12, color: C.sub, marginTop: 4 }}>zone-skip (air)</div>
            </div>
            <div>
              <div style={{ fontSize: 40, fontWeight: 900, color: '#374151', lineHeight: 1 }}>
                ${(shipCost / 1000).toFixed(1)}K
              </div>
              <div style={{ fontSize: 12, color: C.sub, marginTop: 4 }}>est. ship cost</div>
            </div>
          </div>

          {/* Legend */}
          <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap' }}>
            {DCS.map(dc => (
              <div key={dc.name} style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 12, color: '#374151' }}>
                <div style={{ width: 9, height: 9, borderRadius: '50%', background: dc.color, flexShrink: 0 }}/>
                {dc.name}
              </div>
            ))}
            <div style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 12, color: '#374151' }}>
              <div style={{ width: 9, height: 9, borderRadius: '50%', background: C.orange, opacity: 0.7, flexShrink: 0 }}/>
              zone-skip
            </div>
          </div>
        </Card>
      );
    }

    /* ── main app ─────────────────────────────────────────────────── */
    function App() {
      const [discPct,   setDiscPct  ] = useState(0);
      const [demandMult,setDemandMult] = useState(1.0);
      const [stage,     setStage    ] = useState(0);
      const [running,   setRunning  ] = useState(false);
      const timers = useRef([]);

      const stats = calcStats(discPct, demandMult);

      const clearTimers = () => {
        timers.current.forEach(clearTimeout);
        timers.current = [];
      };

      const handleGenerate = useCallback(() => {
        if (running) return;
        clearTimers();
        setRunning(true);
        setStage(0);

        const t = (delay, fn) => {
          const id = setTimeout(fn, delay);
          timers.current.push(id);
        };
        t(80,   () => setStage(1));
        t(1900, () => setStage(2));
        t(2900, () => setStage(3));
        t(3900, () => setStage(4));
        t(4300, () => setRunning(false));
      }, [running]);

      const handleSlider = (setter) => (e) => {
        setter(+e.target.value);
        if (stage > 0) setStage(0);
      };

      return (
        <div style={{ minHeight: '100vh', padding: '36px 16px 60px', background: '#fff' }}>
          <div style={{ maxWidth: 680, margin: '0 auto' }}>

            {/* Header */}
            <div style={{ marginBottom: 28 }}>
              <h1 style={{ fontSize: 26, fontWeight: 900, color: C.text, marginBottom: 6 }}>
                Ecommerce Pipeline
              </h1>
              <p style={{ fontSize: 14, color: C.sub, lineHeight: 1.6 }}>
                Generate a month of orders and watch the analytics pipeline respond — forecast,
                pricing signal, and routing — in one linear sequence.
              </p>
            </div>

            {/* Controls */}
            <div style={{
              background: C.light,
              border: `1px solid ${C.border}`,
              borderRadius: 12,
              padding: '20px 22px 22px',
              marginBottom: 28,
            }}>
              <div style={{ display: 'flex', gap: 28, marginBottom: 20, flexWrap: 'wrap' }}>
                <label style={{ flex: 1, minWidth: 150, display: 'flex', flexDirection: 'column', gap: 7 }}>
                  <span style={{ fontSize: 13, fontWeight: 600, color: '#374151' }}>
                    Discount&nbsp;
                    <span style={{ color: C.orange, fontWeight: 700 }}>{discPct}%</span>
                  </span>
                  <input type="range" min={0} max={30} step={5} value={discPct}
                    onChange={handleSlider(setDiscPct)}
                    style={{ accentColor: C.orange }}/>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: C.sub }}>
                    <span>0%</span><span>30%</span>
                  </div>
                </label>

                <label style={{ flex: 1, minWidth: 150, display: 'flex', flexDirection: 'column', gap: 7 }}>
                  <span style={{ fontSize: 13, fontWeight: 600, color: '#374151' }}>
                    Demand&nbsp;
                    <span style={{ color: C.navy, fontWeight: 700 }}>{demandMult.toFixed(1)}×</span>
                  </span>
                  <input type="range" min={0.5} max={2.0} step={0.1} value={demandMult}
                    onChange={handleSlider(setDemandMult)}
                    style={{ accentColor: C.navy }}/>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: C.sub }}>
                    <span>0.5×</span><span>2.0×</span>
                  </div>
                </label>
              </div>

              <button onClick={handleGenerate} disabled={running} style={{
                width: '100%',
                padding: '13px 0',
                background: running ? '#9CA3AF' : C.navy,
                color: '#fff',
                border: 'none',
                borderRadius: 8,
                fontSize: 15,
                fontWeight: 700,
                cursor: running ? 'not-allowed' : 'pointer',
                letterSpacing: '0.02em',
                transition: 'background 0.18s',
              }}>
                {running ? 'Running…' : '▶  Generate Month of Sales'}
              </button>
            </div>

            {/* Pipeline */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
              <OrdersCard   visible={stage >= 1} nOrders={stats.nOrders}   revenue={stats.revenue} />
              <Connector    visible={stage >= 2} />
              <ForecastCard visible={stage >= 2} actualUnits={stats.actualUnits}
                            forecastUnits={stats.forecastUnits} deltaPct={stats.deltaPct} />
              <Connector    visible={stage >= 3} />
              <PricingCard  visible={stage >= 3} discPct={discPct} />
              <Connector    visible={stage >= 4} />
              <RoutingCard  visible={stage >= 4} nOrders={stats.nOrders} shipCost={stats.shipCost}
                            nGround={stats.nGround} nZoneSkip={stats.nZoneSkip} />
            </div>

            {/* Footer */}
            {stage >= 4 && (
              <div style={{ marginTop: 36, textAlign: 'center' }}>
                <p style={{ fontSize: 12, color: '#9CA3AF' }}>
                  Synthetic data · OM386 Spring 2026 ·{' '}
                  <a href="https://github.com/tommygarner/ecommerce-proj"
                    style={{ color: C.blue, textDecoration: 'none' }}>GitHub</a>
                </p>
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
